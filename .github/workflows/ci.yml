name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright src/
      # Coverage tracing slows rendering enough to blow the 16ms frame budget
      # and perturb snapshot timing on CI runners, so the perf and snapshot
      # tests run uninstrumented in their own step (coverage is 89% either way).
      - run: uv run pytest -q --cov=src/amplifier_app_newtui --cov-report=term --cov-fail-under=85
          --ignore=tests/test_perf_spike.py --ignore=tests/test_ui_snapshots.py
      - run: uv run pytest -q tests/test_perf_spike.py tests/test_ui_snapshots.py
